sets:
  - selector:
      files:
        - docs/**
        - data/**
        - .configs/**
      exclude:
        - data/users-dataset/user2.json
        - data/users-dataset/user3.json
    output:
      path: .
    presets:
      - basic

  - selector:
      files:
        - data/users-dataset/user2.json
    output:
      path: .
      managed: false
      gitignore: false
    presets:
      - special

  - package: eslint@8
    selector:
      files:
        - conf/globals.js
    output:
      path: .
    presets:
      - eslint
      - basic

  - package: eslint@8
    selector:
      files:
        - conf/config-schema.js
    output:
      path: .
      managed: false
    presets:
      - eslint
